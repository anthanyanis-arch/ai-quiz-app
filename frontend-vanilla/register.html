<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – AI Quiz 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f0f4ff;
      --text: #0f0c29;
      --glass: rgba(255,255,255,0.72);
      --glass-border: rgba(108,99,255,0.12);
      --glass-strong: rgba(255,255,255,0.80);
      --navbar-bg: rgba(255,255,255,0.88);
      --navbar-border: rgba(108,99,255,0.10);
      --blob-1: rgba(108,99,255,0.15);
      --blob-2: rgba(0,198,255,0.12);
      --blob-3: rgba(108,99,255,0.06);
      --input-bg: rgba(255,255,255,0.80);
      --input-border: rgba(108,99,255,0.15);
      --input-color: #0f0c29;
      --label-color: #6b7280;
      --upload-bg: rgba(108,99,255,0.04);
      --upload-border: rgba(108,99,255,0.15);
    }
    html.dark {
      --bg: #f0f4ff;
      --text: #0f0c29;
      --glass: rgba(255,255,255,0.72);
      --glass-border: rgba(108,99,255,0.12);
      --glass-strong: rgba(255,255,255,0.80);
      --navbar-bg: rgba(255,255,255,0.88);
      --navbar-border: rgba(108,99,255,0.10);
      --blob-1: rgba(108,99,255,0.15);
      --blob-2: rgba(0,198,255,0.12);
      --blob-3: rgba(108,99,255,0.06);
      --input-bg: rgba(255,255,255,0.80);
      --input-border: rgba(108,99,255,0.15);
      --input-color: #0f0c29;
      --label-color: #6b7280;
      --upload-bg: rgba(108,99,255,0.04);
      --upload-border: rgba(108,99,255,0.15);
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #ffffff 45%, #f5f0ff 70%, #e0f7ff 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }
    h1,h2,h3,h4,.font-display { font-family: 'Syne', sans-serif; }

    /* Animated background */
    .bg-scene {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
      pointer-events: none;
    }
    .blob {
      position: absolute; border-radius: 50%; filter: blur(100px); opacity: 1;
    }
    .blob-1 { width: 600px; height: 600px; background: var(--blob-1); top: -200px; left: -200px; }
    .blob-2 { width: 500px; height: 500px; background: var(--blob-2); bottom: -150px; right: -150px; }
    .blob-3 { width: 400px; height: 400px; background: var(--blob-3); top: 40%; left: 50%; transform: translate(-50%,-50%); filter: blur(120px); }

    /* Grid pattern */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
      background-size: 52px 52px;
    }

    /* Navbar glass */
    .navbar {
      background: var(--navbar-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--navbar-border);
      transition: background 0.3s ease;
    }

    /* Card glass */
    .glass-card {
      background: var(--glass-strong);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(15,12,41,0.30), 0 0 0 1px rgba(108,99,255,0.06);
      transition: background 0.3s ease, border 0.3s ease;
    }

    /* 3D card tilt on hover */
    .tilt-card {
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(.23,1,.32,1), box-shadow 0.4s ease;
      will-change: transform;
    }
    .tilt-card:hover {
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
    }

    /* Inputs */
    .glass-input {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      color: var(--input-color);
      transition: all 0.3s ease;
      width: 100%;
      padding: 10px 14px;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
    }
    .glass-input::placeholder { color: rgba(100,116,139,0.6); }
    html.dark .glass-input::placeholder { color: rgba(255,255,255,0.3); }
    .glass-input:focus {
      background: rgba(108,99,255,0.06);
      border-color: rgba(108,99,255,0.45);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.10);
    }

    /* Button */
    .btn-primary {
      background: linear-gradient(135deg, #6c63ff 0%, #4f46e5 100%);
      border: 1px solid rgba(108,99,255,0.25);
      border-radius: 14px;
      color: #ffffff;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: all 0.35s cubic-bezier(.23,1,.32,1);
      box-shadow: 0 4px 24px rgba(108,99,255,0.15), inset 0 1px 0 rgba(255,255,255,0.10);
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(108,99,255,0.12) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.3s;
    }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(108,99,255,0.25);
    }
    .btn-primary:active { transform: translateY(0) scale(0.98); }
    .btn-primary:disabled {
      opacity: 0.5; cursor: not-allowed;
      box-shadow: none; transform: none;
    }

    /* Upload zone */
    .upload-zone {
      background: var(--upload-bg);
      border: 2px dashed var(--upload-border);
      border-radius: 16px;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .upload-zone:hover {
      background: rgba(108,99,255,0.06);
      border-color: rgba(108,99,255,0.35);
    }
    .upload-zone.uploaded {
      border-color: rgba(108,99,255,0.35);
      background: rgba(56,217,169,0.06);
    }

    /* Animated tick checkbox */
    .tick-wrap {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1.5px solid rgba(108,99,255,0.15);
      background: rgba(255,255,255,0.50);
      cursor: pointer;
      transition: all 0.25s ease;
      user-select: none;
    }
    .tick-wrap:hover { border-color: rgba(108,99,255,0.35); background: rgba(108,99,255,0.04); }
    .tick-wrap.checked { border-color: rgba(108,99,255,0.45); background: rgba(108,99,255,0.07); }
    .tick-box {
      width: 24px; height: 24px; border-radius: 8px; flex-shrink: 0;
      border: 2px solid rgba(108,99,255,0.30);
      background: rgba(255,255,255,0.80);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
      position: relative; overflow: hidden;
    }
    .tick-wrap.checked .tick-box {
      background: linear-gradient(135deg, #6c63ff, #4f46e5);
      border-color: #6c63ff;
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }
    .tick-svg { opacity: 0; transform: scale(0.4); transition: all 0.25s cubic-bezier(.34,1.56,.64,1); }
    .tick-wrap.checked .tick-svg { opacity: 1; transform: scale(1); }
    .tick-path { stroke-dasharray: 20; stroke-dashoffset: 20; transition: stroke-dashoffset 0.3s ease 0.05s; }
    .tick-wrap.checked .tick-path { stroke-dashoffset: 0; }

    /* Error box */
    .error-box {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 12px;
      color: #dc2626;
      padding: 10px 14px;
      font-size: 14px;
      text-align: center;
    }

    /* Floating decorative dots */
    .dot-cluster { position: absolute; pointer-events: none; }

    /* Fade-in animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .fade-up { animation: fadeUp 0.6s cubic-bezier(.23,1,.32,1) both; }
    .fade-up-delay { animation: fadeUp 0.6s 0.15s cubic-bezier(.23,1,.32,1) both; }

    /* Logo pulse ring */
    @keyframes ringPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(79,142,247,0.3); }
      50% { box-shadow: 0 0 0 8px rgba(79,142,247,0); }
    }
    .logo-ring { animation: ringPulse 2.5s ease-in-out infinite; }

    /* Success icon */
    @keyframes checkDraw {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .check-path {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: checkDraw 0.6s 0.3s ease forwards;
    }

    /* Success page extras */
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes ringPing {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(1.9); opacity: 0; }
    }
    .pop-in    { animation: popIn   0.5s cubic-bezier(.34,1.56,.64,1) both; }
    .slide-up-1{ animation: slideUp 0.45s 0.15s ease both; }
    .slide-up-2{ animation: slideUp 0.45s 0.28s ease both; }
    .slide-up-3{ animation: slideUp 0.45s 0.40s ease both; }
    .slide-up-4{ animation: slideUp 0.45s 0.52s ease both; }
    .ring-ping {
      position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid rgba(108,99,255,0.35);
      animation: ringPing 1.4s ease-out 0.4s infinite;
    }
    .step-row {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .step-dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
      font-family: 'Syne', sans-serif;
    }
    .info-chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-radius: 12px;
      background: rgba(108,99,255,0.06);
      border: 1px solid rgba(108,99,255,0.15);
      font-size: 13px;
    }

    /* Label */
    .field-label {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--label-color);
      margin-bottom: 6px;
      display: block;
    }

    /* Theme toggle */
    .theme-toggle {
      width: 36px; height: 36px; border-radius: 10px;
      border: 1px solid rgba(108,99,255,0.15);
      background: rgba(255,255,255,0.80);
      backdrop-filter: blur(8px);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
      color: #6b7280;
      flex-shrink: 0;
    }
    .theme-toggle:hover { background: rgba(108,99,255,0.10); color: #6c63ff; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(108,99,255,0.15); border-radius: 3px; }

    /* Mobile: remove heavy blur for perf */
    @media (max-width: 640px) {
      .glass-card { backdrop-filter: blur(12px); }
      .navbar { backdrop-filter: blur(12px); }
      .blob { filter: blur(50px); }
    }
  </style>
</head>
<body>

<!-- Background -->
<div class="bg-scene">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>
<div class="grid-overlay"></div>

<script src="api.js"></script>
  <script src="ambient.js"></script>
<div id="navbar-root"></div>
<script src="navbar.js"></script>

<main class="relative z-10 flex-grow flex items-center justify-center py-10 px-4 min-h-[calc(100vh-64px)]">

  <!-- Form View -->
  <div id="form-view" class="fade-up w-full max-w-xl">
    <!-- Header badge -->
    <div class="text-center mb-6 fade-up">
      <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-blue-500/30 bg-blue-500/10 mb-4">
        <span class="w-1.5 h-1.5 rounded-full bg-blue-400 animate-pulse"></span>
        <span class="text-[#6c63ff] text-xs font-semibold tracking-widest uppercase">Registrations Open</span>
      </div>
      <!-- 3D Register Illustration -->
      <div class="flex justify-center mb-3">
        <svg width="130" height="110" viewBox="0 0 130 110" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 10px 30px rgba(79,142,247,0.35)) drop-shadow(0 3px 8px rgba(0,0,0,0.2));animation:floatReg 4.5s ease-in-out infinite"><style>@keyframes floatReg{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}</style>
          <defs>
            <linearGradient id="rg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#93c5fd"/><stop offset="100%" stop-color="#3b6ef0"/></linearGradient>
            <linearGradient id="rg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#bfdbfe"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
            <linearGradient id="rclip" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
          </defs>
          <ellipse cx="65" cy="106" rx="38" ry="6" fill="rgba(59,130,246,0.15)"/>
          <!-- clipboard -->
          <rect x="28" y="22" width="74" height="78" rx="8" fill="url(#rg1)"/>
          <rect x="28" y="22" width="74" height="22" rx="8" fill="url(#rg2)" opacity="0.5"/>
          <!-- clip -->
          <rect x="52" y="14" width="26" height="14" rx="7" fill="url(#rclip)"/>
          <rect x="57" y="17" width="16" height="8" rx="4" fill="#fef3c7"/>
          <!-- form lines -->
          <rect x="36" y="52" width="56" height="4" rx="2" fill="rgba(255,255,255,0.7)"/>
          <rect x="36" y="62" width="40" height="4" rx="2" fill="rgba(255,255,255,0.5)"/>
          <rect x="36" y="72" width="50" height="4" rx="2" fill="rgba(255,255,255,0.5)"/>
          <!-- checkbox checked -->
          <rect x="36" y="82" width="10" height="10" rx="3" fill="#1d4ed8"/>
          <path d="M38 87 L40.5 89.5 L45 84" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="50" y="84" width="30" height="4" rx="2" fill="rgba(255,255,255,0.5)"/>
          <!-- pencil -->
          <g transform="translate(82,38) rotate(-35)">
            <rect x="0" y="0" width="8" height="28" rx="2" fill="#fbbf24"/>
            <rect x="0" y="0" width="8" height="6" rx="2" fill="#fca5a5"/>
            <polygon points="0,28 8,28 4,36" fill="#374151"/>
            <polygon points="2,34 6,34 4,38" fill="#f9fafb"/>
          </g>
          <!-- sparkles -->
          <circle cx="22" cy="30" r="3" fill="#fbbf24" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/></circle>
          <circle cx="108" cy="50" r="2" fill="#a78bfa" opacity="0.7"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="1.7s" repeatCount="indefinite"/></circle>
        </svg>
      </div>
      <h1 class="font-display text-3xl sm:text-4xl font-bold text-[#0f0c29] mb-2">Student <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#6c63ff] to-[#6b7280]">Registration</span></h1>
      <p class="text-[#6b7280]/50 text-sm">AI Quiz Competition 2026 — Class of 2025</p>
    </div>

    <div class="glass-card tilt-card p-6 sm:p-8 fade-up-delay">
      <div id="error-box" style="display:none;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:12px;color:#dc2626;padding:10px 14px;font-size:14px;text-align:center;margin-bottom:20px"></div>

      <form id="reg-form" class="space-y-5">

        <!-- Full Name -->
        <div>
          <label class="field-label">Full Name</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-white/30">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input id="fullName" type="text" required placeholder="Enter your full name" class="glass-input pl-9"/>
          </div>
        </div>

        <!-- Email + Phone -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="field-label">Email</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-white/30">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <input id="email" type="email" required placeholder="you@example.com" class="glass-input pl-9"/>
            </div>
          </div>
          <div>
            <label class="field-label">Phone</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-white/30">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              </span>
              <input id="phone" type="tel" required placeholder="+91 xxxxx xxxxx" class="glass-input pl-9"/>
            </div>
          </div>
        </div>

        <!-- School -->
        <div>
          <label class="field-label">School / College Name</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-white/30">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </span>
            <input id="schoolName" type="text" required placeholder="e.g. ABC Higher Secondary School" class="glass-input pl-9"/>
          </div>
        </div>

        <!-- Year check -->
        <div id="tick-wrap" class="tick-wrap" onclick="toggleTick()">
          <div class="tick-box">
            <svg class="tick-svg" width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path class="tick-path" d="M2 7 L5.5 10.5 L12 3" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <input id="yearCheck" type="checkbox" class="sr-only"/>
          <span class="text-[#0f0c29]/70 text-sm leading-snug">
            I am a <span class="text-[#0f0c29] font-semibold">12th Standard School Student</span> (Class XII, 2025 batch)
          </span>
        </div>

        <!-- File Upload -->
        <div>
          <label class="field-label">Upload ID Card <span class="text-blue-400 normal-case">(JPG/PNG)</span> <span class="text-red-600">*</span></label>
          <label id="upload-zone" class="upload-zone flex flex-col items-center justify-center py-7 px-4 text-center cursor-pointer">
            <div id="upload-icon-wrap" class="w-12 h-12 rounded-xl bg-[#6c63ff]/10 border border-[#6c63ff]/20 flex items-center justify-center mb-3">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="#6c63ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <polyline points="16 16 12 12 8 16"/>
                <line x1="12" y1="12" x2="12" y2="21"/>
                <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
              </svg>
            </div>
            <p id="file-label" class="text-gray-500 text-sm"><span class="text-gray-700 font-medium">Click to upload</span> or drag and drop</p>
            <p id="file-hint" class="text-gray-400 text-xs mt-1">PNG, JPG, WEBP · Max 250 KB</p>
            <input id="file-upload" type="file" class="sr-only" accept=".png,.jpg,.jpeg,.gif,.webp" onchange="handleFile(this)"/>
          </label>
        </div>

        <!-- Submit -->
        <button type="submit" id="submit-btn" class="btn-primary w-full py-3.5 text-base flex items-center justify-center gap-2 mt-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          Register for Quiz
        </button>

        <p class="text-center text-sm text-[#6b7280]/50">Already registered?
          <a href="login.html" class="text-[#6c63ff] font-medium hover:text-[#0f0c29] transition-colors">Login here</a>
        </p>
      </form>
    </div>

    <!-- Footer note -->
    <p class="text-center text-[#6b7280]/25 text-xs mt-5 fade-up-delay">Your data is secure · Registration requires admin approval</p>
  </div>
</main>

<script>
  const API = window.API || 'https://ai-quiz-app-1-zbsq.onrender.com/api';

  function toggleTick() {
    const wrap = document.getElementById('tick-wrap');
    const cb   = document.getElementById('yearCheck');
    cb.checked = !cb.checked;
    wrap.classList.toggle('checked', cb.checked);
  }

  const MAX_UPLOAD_KB = 250;
  const MAX_UPLOAD_BYTES = MAX_UPLOAD_KB * 1024;

  function showError(message) {
    const errBox = document.getElementById('error-box');
    if (!errBox) return;
    errBox.textContent = message;
    errBox.style.display = 'block';
  }

  // Global — called from inline onchange attribute
  function handleFile(input) {
    if (!input.files || !input.files[0]) return;
    if (input.files[0].size > MAX_UPLOAD_BYTES) {
      input.value = '';
      document.getElementById('upload-zone').classList.remove('uploaded');
      document.getElementById('file-label').innerHTML = '<span class="text-gray-700 font-medium">Click to upload</span> or drag and drop';
      document.getElementById('file-hint').textContent = `PNG, JPG, WEBP · Max ${MAX_UPLOAD_KB} KB`;
      showError(`File size must be ${MAX_UPLOAD_KB} KB or less.`);
      return;
    }
    const errBox = document.getElementById('error-box');
    if (errBox) errBox.style.display = 'none';
    document.getElementById('upload-zone').classList.add('uploaded');
    document.getElementById('upload-icon-wrap').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="#6c63ff" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
    document.getElementById('file-label').innerHTML = `<span style="color:#6c63ff;font-weight:600">${input.files[0].name}</span>`;
    document.getElementById('file-hint').textContent = (input.files[0].size / 1024).toFixed(0) + ' KB';
  }

  document.addEventListener('DOMContentLoaded', function () {
    console.log('[register.html] DOMContentLoaded — attaching form submit handler');

    // Tilt on desktop
    const tiltCard = document.querySelector('.tilt-card');
    if (tiltCard && window.innerWidth > 768) {
      tiltCard.addEventListener('mousemove', function(e) {
        const rect = tiltCard.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top)  / rect.height - 0.5;
        tiltCard.style.transform = 'perspective(1000px) rotateY(' + (x*6) + 'deg) rotateX(' + (-y*6) + 'deg) translateZ(4px)';
      });
      tiltCard.addEventListener('mouseleave', function() {
        tiltCard.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg) translateZ(0)';
      });
    }

    // Form submit
    document.getElementById('reg-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      console.log('[register.html] Form submit triggered');

      const btn    = document.getElementById('submit-btn');
      const errBox = document.getElementById('error-box');
      const name   = document.getElementById('fullName').value.trim();
      const email  = document.getElementById('email').value.trim();
      const phone  = document.getElementById('phone').value.trim();
      const school = document.getElementById('schoolName').value.trim();

      errBox.style.display = 'none';

      const file = document.getElementById('file-upload').files[0];

      if (!name || !email || !phone || !school) {
        errBox.textContent = 'Please fill in all required fields.';
        errBox.style.display = 'block';
        console.warn('[register.html] Validation failed: missing fields');
        return;
      }
      if (!file) {
        errBox.textContent = 'Please upload your ID card image for admin verification.';
        errBox.style.display = 'block';
        console.warn('[register.html] Validation failed: no file uploaded');
        return;
      }
      if (file.size > MAX_UPLOAD_BYTES) {
        errBox.textContent = `File size must be ${MAX_UPLOAD_KB} KB or less.`;
        errBox.style.display = 'block';
        console.warn('[register.html] Validation failed: file too large');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = 'Submitting…';
      console.log('[register.html] Sending registration request to API...');

      const formData = new FormData();
      formData.append('fullName', name);
      formData.append('email', email);
      formData.append('phone', phone);
      formData.append('schoolName', school);
      formData.append('yearOfCompletion', '2025');
      formData.append('markSheet', file);

      try {
        const res = await fetch(API + '/auth/register', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Registration failed');
        sessionStorage.setItem('regSuccess', JSON.stringify({ name, email, school }));
        location.replace('success.html');
      } catch (err) {
        errBox.textContent = err.message;
        errBox.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Register for Quiz';
      }
    });

  });
</script>


</body>
</html>
