services:
  - type: web
    name: ai-quiz-backend-1
    env: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: QUIZ_PASSWORD
        sync: false
      - key: OTP_EXPIRY
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false

  - type: web
    name: ai-quiz-backend-2
    env: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: QUIZ_PASSWORD
        sync: false
      - key: OTP_EXPIRY
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
